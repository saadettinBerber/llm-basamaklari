<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bir LLM Nasıl İnşa Edilir?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#242844; --muted:#6b7192; --faint:#9aa0b8;
    --rose:#e0576a; --green:#26a06a;
    --card-bd:#e6eaf4;
    --hue:#3b6fd4;
    --disp:'Bricolage Grotesque',system-ui,sans-serif;
    --body:'Hanken Grotesk',system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--body); color:var(--ink);
    background:
      radial-gradient(760px 480px at 90% -8%, rgba(255,192,138,.30), transparent 62%),
      radial-gradient(720px 560px at -8% 108%, rgba(150,222,190,.30), transparent 60%),
      radial-gradient(680px 560px at 46% 122%, rgba(184,172,244,.22), transparent 60%),
      linear-gradient(180deg,#fdfeff, #eef3fb);
    overflow:hidden;
  }
  .deck{height:100vh; display:flex; flex-direction:column;
    padding:clamp(18px,3.4vh,40px) clamp(22px,5vw,74px) clamp(14px,2.8vh,28px);
    gap:clamp(12px,2.4vh,24px);}

  .top{display:flex; justify-content:space-between; align-items:baseline; gap:16px}
  .brand{font-family:var(--disp); font-weight:700; font-size:clamp(.95rem,1.5vw,1.18rem); letter-spacing:-.01em}
  .brand b{color:var(--muted); font-weight:600}
  .counter{font-family:var(--mono); font-size:.8rem; letter-spacing:.14em; color:var(--faint)}
  .counter em{color:var(--ink); font-style:normal; font-weight:700}

  .main{flex:1 1 auto; min-height:0; display:flex; gap:clamp(14px,2.6vw,34px)}

  /* left rail — the staircase */
  .rail{flex:0 0 clamp(148px,20vw,220px); display:flex; flex-direction:column-reverse; justify-content:flex-start; gap:clamp(6px,1vh,10px); align-self:center}
  .rung{display:flex; align-items:center; gap:9px; padding:9px 11px; border-radius:12px; background:#fff; border:1.5px solid var(--card-bd);
        box-shadow:0 4px 14px rgba(40,60,120,.05); opacity:.4; transition:all .5s cubic-bezier(.2,.8,.2,1)}
  .rung .rnum{font-family:var(--mono); font-weight:700; width:26px; height:26px; flex:0 0 auto; display:grid; place-items:center; border-radius:7px; background:#eef1f8; color:var(--muted); font-size:.82rem}
  .rung .rname{font-family:var(--mono); font-size:.6rem; letter-spacing:.1em; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .rung.done{opacity:1; border-color:color-mix(in srgb,var(--c) 42%,#fff)}
  .rung.done .rnum{background:color-mix(in srgb,var(--c) 15%,#fff); color:var(--c)}
  .rung.cur{opacity:1; border-color:var(--c); box-shadow:0 8px 22px color-mix(in srgb,var(--c) 32%,transparent); transform:translateX(5px) scale(1.04)}
  .rung.cur .rnum{background:var(--c); color:#fff}
  .rung.cur .rname{color:var(--c)}
  .deck.intro .rail{display:none}

  /* right content */
  .content{flex:1 1 auto; min-width:0; display:flex; flex-direction:column; justify-content:center; gap:clamp(10px,1.8vh,16px)}
  /* slayt geçişi — yeni içerik yumuşakça kayarak belirir */
  .content{opacity:0; transform:translateX(24px); transition:opacity .42s ease, transform .42s cubic-bezier(.2,.8,.2,1)}
  .content.enter-prev{transform:translateX(-24px)}
  .content.enter-next,.content.enter-prev{opacity:1; transform:translateX(0)}
  .eksik{align-self:flex-start; font-family:var(--mono); font-size:.72rem; letter-spacing:.03em; color:var(--rose);
         background:rgba(224,87,106,.09); border:1px solid rgba(224,87,106,.28); padding:6px 13px; border-radius:999px}
  .q{font-family:var(--disp); font-weight:800; letter-spacing:-.02em; line-height:1.02; font-size:clamp(1.6rem,4.2vw,2.9rem)}
  .qrow{display:flex; align-items:center; gap:16px; flex-wrap:wrap}
  .substep{display:flex; gap:7px; align-items:center; padding:5px 11px; border-radius:999px;
    background:color-mix(in srgb,var(--hue) 8%,#fff); border:1px solid color-mix(in srgb,var(--hue) 22%,#fff)}
  .substep span{width:8px; height:8px; border-radius:50%; background:color-mix(in srgb,var(--hue) 28%,#fff); transition:all .3s}
  .substep span.on{background:var(--hue); transform:scale(1.35)}
  .viz{background:#fff; border:1px solid var(--card-bd); border-radius:20px; box-shadow:0 16px 42px rgba(40,60,120,.10);
       padding:clamp(8px,1.6vh,18px); display:flex; align-items:center; justify-content:center}
  .viz svg{width:100%; height:auto; max-height:min(45vh,350px); display:block}
  .intro-viz{background:transparent; border:none; box-shadow:none; padding:0}
  .intro-viz svg{max-height:min(62vh,440px)}
  .viz text{font-family:var(--body)} .viz .m{font-family:var(--mono)}
  .cap{font-family:var(--mono); font-size:.78rem; letter-spacing:.05em; color:var(--muted)}
  .src{font-family:var(--mono); font-size:.68rem; letter-spacing:.02em; color:var(--faint); display:flex; gap:6px; flex-wrap:wrap; align-items:baseline}
  .src::before{content:"▸ kaynak"; color:color-mix(in srgb,var(--hue) 60%,var(--faint)); font-weight:700; margin-right:2px}
  .src span,.src .src-link{white-space:nowrap}
  .src>*:not(:last-child)::after{content:"·"; color:var(--card-bd); margin-left:6px}
  .src-link{color:var(--faint); text-decoration:none; border-bottom:1px dotted color-mix(in srgb,var(--hue) 45%,var(--card-bd)); cursor:pointer; transition:color .15s}
  .src-link:hover{color:var(--hue); border-bottom-color:var(--hue)}
  .src-link:focus-visible{outline:2px solid var(--hue); outline-offset:2px; border-radius:3px}

  /* intro */
  .intro-grid{display:grid; grid-template-columns:1.05fr .95fr; gap:clamp(20px,4vw,48px); align-items:center; width:100%}
  .intro-text{display:flex; flex-direction:column; gap:clamp(12px,2vh,20px)}
  .eyebrow{font-family:var(--mono); font-size:.8rem; letter-spacing:.26em; color:var(--faint)}
  .title-big{font-family:var(--disp); font-weight:800; letter-spacing:-.03em; line-height:.98; font-size:clamp(2.5rem,7vw,4.8rem);
             background:linear-gradient(120deg,#2b3566,#3b6fd4 55%,#12a594); -webkit-background-clip:text; background-clip:text; color:transparent}
  .lede{font-size:clamp(1.02rem,1.9vw,1.28rem); line-height:1.55; color:var(--muted); max-width:46ch}
  .lede b{color:var(--ink); font-weight:600}
  .hint{font-family:var(--mono); font-size:.78rem; letter-spacing:.08em; color:var(--faint)}
  .hint kbd{background:#fff; border:1px solid var(--card-bd); border-radius:6px; padding:2px 8px; color:var(--ink); box-shadow:0 1px 0 var(--card-bd)}

  /* nav */
  .nav{display:flex; align-items:center; justify-content:space-between; gap:16px}
  .btn{font-family:var(--body); font-weight:600; font-size:.95rem; color:var(--ink); background:#fff; border:1px solid var(--card-bd);
       padding:11px 20px; border-radius:11px; cursor:pointer; transition:all .18s; box-shadow:0 3px 10px rgba(40,60,120,.06)}
  .btn:hover:not(:disabled){border-color:#c9d1e6; transform:translateY(-1px)}
  .btn:active:not(:disabled){transform:translateY(0)}
  .btn:disabled{opacity:.32; cursor:default}
  .btn.primary{background:var(--hue); border-color:transparent; color:#fff; box-shadow:0 6px 18px color-mix(in srgb,var(--hue) 34%,transparent)}
  .btn.primary:hover{filter:brightness(1.06)}
  .btn:focus-visible{outline:2px solid var(--hue); outline-offset:2px}
  .dots{display:flex; gap:9px}
  .dots span{width:8px; height:8px; border-radius:50%; background:#d3dae9; transition:all .3s; cursor:pointer}
  .dots span.active{background:var(--hue); transform:scale(1.4)}

  @media (max-width:720px){
    .main{flex-direction:column; gap:12px}
    .rail{flex:0 0 auto; flex-direction:row; overflow:auto; align-self:stretch}
    .rung{flex:0 0 auto}.rung .rname{display:none}
    .intro-grid{grid-template-columns:1fr}
    .q{font-size:clamp(1.5rem,7vw,2.2rem)}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;animation:none!important}
    .content{opacity:1!important;transform:none!important}
  }
</style>
</head>

const deck=document.getElementById("deck"),content=document.getElementById("content"),rail=document.getElementById("rail");
const curEl=document.getElementById("cur"),dotsEl=document.getElementById("dots"),prevBtn=document.getElementById("prev"),nextBtn=document.getElementById("next");
document.getElementById("tot").textContent=SLIDES.length;

const rungEls=RAIL.map((r,i)=>{const el=document.createElement("div");el.className="rung";el.style.setProperty("--c",HUES[i]);
  el.style.marginLeft=(i*14)+"px";el.innerHTML=`<span class="rnum">${r[0]}</span><span class="rname">${r[1]}</span>`;
  el.addEventListener("click",()=>{if(el.classList.contains("done")||el.classList.contains("cur"))go(i+1);});rail.appendChild(el);return el;});
const dotEls=SLIDES.map((_,i)=>{const s=document.createElement("span");s.addEventListener("click",()=>go(i));dotsEl.appendChild(s);return s;});

let idx=0;
function states(i){const s=SLIDES[i];if(s.type==="intro")return{rev:0,cur:0};if(s.type==="recap")return{rev:5,cur:0};return{rev:s.n,cur:s.n};}

function render(){
  const s=SLIDES[idx],{rev,cur}=states(idx),hue=s.hue||HUES[0];
  deck.classList.toggle("intro",s.type==="intro");
  deck.style.setProperty("--hue",hue);
  curEl.textContent=idx+1;
  prevBtn.disabled=idx===0; nextBtn.disabled=idx===SLIDES.length-1;
  nextBtn.textContent=idx===SLIDES.length-1?"Bitti":"Sonraki →";
  dotEls.forEach((d,i)=>{d.classList.toggle("active",i===idx);d.style.setProperty("--hue",hue);});
  rungEls.forEach((el,i)=>{const n=i+1;el.classList.toggle("done",n<=rev&&n!==cur);el.classList.toggle("cur",n===cur);});
  content.innerHTML=build(s);
  animateEnter();
}
function animateEnter(){
  content.classList.remove("enter-next","enter-prev");
  void content.offsetWidth;                 /* reflow: transition'ı yeniden tetikler */
  content.classList.add(lastDir>0?"enter-next":"enter-prev");
}
function build(s){
  if(s.type==="intro")return `<div class="intro-grid"><div class="intro-text">
     <div class="eyebrow">YAPAY ZEKA · BİR GİRİŞ</div>
     <h1 class="title-big">Bir LLM Nasıl İnşa Edilir?</h1>
     <p class="lede"><b>“Yapay zeka” = büyük dil modeli.</b><br>Sıfırdan nasıl bu hâle gelir?</p>
     <div class="hint">İlerlemek için <kbd>→</kbd> ya da “Sonraki”</div></div>
     <div class="viz intro-viz">${SVG_INTRO}</div></div>`;
  if(s.type==="recap")return `<div class="cap" style="color:var(--hue)">ÖZET</div><h2 class="q">${s.q}</h2>
     <div class="viz">${s.svg}</div><div class="cap">${s.cap}</div>${srcLine(s)}`;
  const chip=s.gap?`<div class="eksik">önceki eksik: ${s.gap}</div>`:`<div class="eksik" style="color:var(--muted);background:rgba(0,0,0,.03);border-color:var(--card-bd)">${s.start}</div>`;
  return `${chip}<div class="qrow"><h2 class="q">${s.q}</h2>${substepDots()}</div><div class="viz">${s.svg}</div><div class="cap">${s.cap}</div>${srcLine(s)}`;
}
function srcUrl(cite){
  const arxiv=cite.match(/arXiv:(\d{4}\.\d{4,5})/i);
  if(arxiv)return "https://arxiv.org/abs/"+arxiv[1];
  const url=cite.match(/https?:\/\/\S+|[\w.-]+\.[a-z]{2,}\/\S+/i);
  if(url)return url[0].startsWith("http")?url[0]:"https://"+url[0];
  return null;
}
function srcLine(s){
  if(!s.src||!s.src.length)return "";
  const items=s.src.map(c=>{
    const url=srcUrl(c);
    return url
      ? `<a class="src-link" href="${url}" target="_blank" rel="noopener">${c}</a>`
      : `<span>${c}</span>`;
  }).join("");
  return `<div class="src">${items}</div>`;
}
function substep(){
  const s=SLIDES[idx];if(s.type!=="step")return null;
  let first=idx;while(first>0&&SLIDES[first-1].type==="step"&&SLIDES[first-1].n===s.n)first--;
  let count=0;while(first+count<SLIDES.length&&SLIDES[first+count].type==="step"&&SLIDES[first+count].n===s.n)count++;
  if(count<2)return null;
  return{pos:idx-first,count};
}
function substepDots(){
  const info=substep();if(!info)return "";
  const dots=Array.from({length:info.count},(_,i)=>`<span class="${i===info.pos?"on":""}"></span>`).join("");
  return `<div class="substep" title="bu basamağın ${info.count} adımından ${info.pos+1}.">${dots}</div>`;
}
let lastDir=1;
function go(i){
  const next=Math.max(0,Math.min(SLIDES.length-1,i));
  if(next===idx)return;
  lastDir=next>idx?1:-1;
  idx=next;
  if(location.hash!=="#"+(idx+1))location.hash=idx+1;
  render();
}
function slideFromHash(){
  const n=parseInt(location.hash.slice(1),10);
  return Number.isFinite(n)?Math.max(0,Math.min(SLIDES.length-1,n-1)):0;
}
prevBtn.onclick=()=>go(idx-1); nextBtn.onclick=()=>go(idx+1);
window.addEventListener("keydown",e=>{
  if(["ArrowRight"," ","PageDown"].includes(e.key)){e.preventDefault();go(idx+1);}
  else if(["ArrowLeft","PageUp"].includes(e.key)){e.preventDefault();go(idx-1);}
  else if(e.key==="Home")go(0); else if(e.key==="End")go(SLIDES.length-1);
});
window.addEventListener("hashchange",()=>{const i=slideFromHash();if(i!==idx)go(i);});
idx=slideFromHash();
render();
</script>
</body>
</html>
