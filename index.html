<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bir LLM Nasıl İnşa Edilir?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#242844; --muted:#6b7192; --faint:#9aa0b8;
    --rose:#e0576a; --green:#26a06a;
    --card-bd:#e6eaf4;
    --hue:#3b6fd4;
    --disp:'Bricolage Grotesque',system-ui,sans-serif;
    --body:'Hanken Grotesk',system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--body); color:var(--ink);
    background:
      radial-gradient(760px 480px at 90% -8%, rgba(255,192,138,.30), transparent 62%),
      radial-gradient(720px 560px at -8% 108%, rgba(150,222,190,.30), transparent 60%),
      radial-gradient(680px 560px at 46% 122%, rgba(184,172,244,.22), transparent 60%),
      linear-gradient(180deg,#fdfeff, #eef3fb);
    overflow:hidden;
  }
  .deck{height:100vh; display:flex; flex-direction:column;
    padding:clamp(18px,3.4vh,40px) clamp(22px,5vw,74px) clamp(14px,2.8vh,28px);
    gap:clamp(12px,2.4vh,24px);}

  .top{display:flex; justify-content:space-between; align-items:baseline; gap:16px}
  .brand{font-family:var(--disp); font-weight:700; font-size:clamp(.95rem,1.5vw,1.18rem); letter-spacing:-.01em}
  .brand b{color:var(--muted); font-weight:600}
  .counter{font-family:var(--mono); font-size:.8rem; letter-spacing:.14em; color:var(--faint)}
  .counter em{color:var(--ink); font-style:normal; font-weight:700}

  .main{flex:1 1 auto; min-height:0; display:flex; gap:clamp(14px,2.6vw,34px)}

  /* left rail — the staircase */
  .rail{flex:0 0 clamp(148px,20vw,220px); display:flex; flex-direction:column-reverse; justify-content:flex-start; gap:clamp(6px,1vh,10px); align-self:center}
  .rung{display:flex; align-items:center; gap:9px; padding:9px 11px; border-radius:12px; background:#fff; border:1.5px solid var(--card-bd);
        box-shadow:0 4px 14px rgba(40,60,120,.05); opacity:.4; transition:all .5s cubic-bezier(.2,.8,.2,1)}
  .rung .rnum{font-family:var(--mono); font-weight:700; width:26px; height:26px; flex:0 0 auto; display:grid; place-items:center; border-radius:7px; background:#eef1f8; color:var(--muted); font-size:.82rem}
  .rung .rname{font-family:var(--mono); font-size:.6rem; letter-spacing:.1em; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .rung.done{opacity:1; border-color:color-mix(in srgb,var(--c) 42%,#fff)}
  .rung.done .rnum{background:color-mix(in srgb,var(--c) 15%,#fff); color:var(--c)}
  .rung.cur{opacity:1; border-color:var(--c); box-shadow:0 8px 22px color-mix(in srgb,var(--c) 32%,transparent); transform:translateX(5px) scale(1.04)}
  .rung.cur .rnum{background:var(--c); color:#fff}
  .rung.cur .rname{color:var(--c)}
  .deck.intro .rail{display:none}

  /* right content */
  .content{flex:1 1 auto; min-width:0; display:flex; flex-direction:column; justify-content:center; gap:clamp(10px,1.8vh,16px)}
  /* slayt geçişi — yeni içerik yumuşakça kayarak belirir */
  .content{opacity:0; transform:translateX(24px); transition:opacity .42s ease, transform .42s cubic-bezier(.2,.8,.2,1)}
  .content.enter-prev{transform:translateX(-24px)}
  .content.enter-next,.content.enter-prev{opacity:1; transform:translateX(0)}
  .eksik{align-self:flex-start; font-family:var(--mono); font-size:.72rem; letter-spacing:.03em; color:var(--rose);
         background:rgba(224,87,106,.09); border:1px solid rgba(224,87,106,.28); padding:6px 13px; border-radius:999px}
  .q{font-family:var(--disp); font-weight:800; letter-spacing:-.02em; line-height:1.02; font-size:clamp(1.6rem,4.2vw,2.9rem)}
  .qrow{display:flex; align-items:center; gap:16px; flex-wrap:wrap}
  .substep{display:flex; gap:7px; align-items:center; padding:5px 11px; border-radius:999px;
    background:color-mix(in srgb,var(--hue) 8%,#fff); border:1px solid color-mix(in srgb,var(--hue) 22%,#fff)}
  .substep span{width:8px; height:8px; border-radius:50%; background:color-mix(in srgb,var(--hue) 28%,#fff); transition:all .3s}
  .substep span.on{background:var(--hue); transform:scale(1.35)}
  .viz{background:#fff; border:1px solid var(--card-bd); border-radius:20px; box-shadow:0 16px 42px rgba(40,60,120,.10);
       padding:clamp(8px,1.6vh,18px); display:flex; align-items:center; justify-content:center; width:100%}
  .viz svg{width:100%; height:auto; max-height:min(66vh,560px); display:block}
  /* HTML içerikli slaytlar (SVG yerine kartlar) */
  .viz-html{display:block; padding:clamp(14px,2.2vh,26px); overflow:auto}
  .tools-hero{display:flex; align-items:center; gap:18px; background:linear-gradient(120deg,#fff,#fdecea);
    border:2px solid var(--hue); border-radius:16px; padding:14px 20px; margin-bottom:16px;
    box-shadow:0 8px 22px color-mix(in srgb,var(--hue) 18%,transparent)}
  .viz-html svg.hbot{width:70px!important; height:72px!important; max-height:72px!important; flex:0 0 auto}
  .tools-hero h3{font-family:var(--disp); font-size:clamp(1.1rem,2.2vw,1.5rem); font-weight:800; color:var(--ink); letter-spacing:-.01em}
  .tools-hero h3 .who{font-family:var(--mono); font-size:.62em; font-weight:600; color:var(--muted); letter-spacing:0}
  .tools-hero p{font-size:.92rem; color:var(--muted); margin-top:3px}
  .tools-hero .lock{margin-left:auto; align-self:flex-start; font-size:.72rem; font-family:var(--mono); color:var(--faint)}
  .tools-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px}
  .tcol{background:#fff; border:1px solid var(--card-bd); border-radius:14px; padding:12px 14px}
  .tcol h4{font-family:var(--mono); font-size:.74rem; letter-spacing:.04em; color:var(--ink); font-weight:700; margin-bottom:10px; display:flex; align-items:center; gap:7px}
  .tcol h4 .ic{font-size:1rem}
  .trow{display:flex; align-items:center; justify-content:space-between; gap:8px; padding:6px 0; border-top:1px solid #f1f4fa}
  .trow:first-of-type{border-top:none}
  .trow .nm{font-size:.9rem; font-weight:600; color:var(--ink)}
  .trow .nm.star{color:var(--hue)}
  .trow .sub{font-size:.66rem; font-family:var(--mono); color:var(--faint); display:block; font-weight:400}
  .trow .bdg{font-size:.62rem; font-family:var(--mono); padding:2px 7px; border-radius:999px; white-space:nowrap; flex:0 0 auto}
  .bdg.open{background:#eaf7f0; color:#1d7a50}
  .bdg.closed{background:#f4f6fb; color:#8892b0}
  .tools-note{margin-top:14px; font-family:var(--mono); font-size:.76rem; color:var(--muted);
    background:#fff6e8; border:1px solid #f0d9a8; border-radius:10px; padding:8px 13px}
  .tools-note b{color:#b5730f}
  @media (max-width:720px){.tools-grid{grid-template-columns:1fr}}

  /* ---- logo ızgarası (AI kodlama araçları) ---- */
  .tools-hero .lg{flex:0 0 auto; margin-left:auto; align-self:center}
  .tools-hero .lg svg{width:56px; height:56px; display:block}
  .tools-hero .herometa{display:flex; align-items:center; gap:8px; margin-top:8px}
  .logo-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:12px}
  .lcard{position:relative; background:#fff; border:1px solid var(--card-bd); border-radius:14px;
    padding:12px 13px; display:flex; align-items:center; gap:11px; min-width:0; transition:transform .18s, box-shadow .18s, border-color .18s}
  .lcard:hover{transform:translateY(-3px); box-shadow:0 10px 24px rgba(40,60,120,.10); border-color:color-mix(in srgb,var(--hue) 32%,var(--card-bd))}
  .lcard .glyph{flex:0 0 auto; width:40px; height:40px; display:grid; place-items:center}
  .lcard .glyph svg{width:40px; height:40px; display:block}
  .lcard .meta{min-width:0; flex:1 1 auto; display:flex; flex-direction:column; gap:2px}
  .lcard .lname{font-size:.9rem; font-weight:700; color:var(--ink); line-height:1.15; letter-spacing:-.01em;
    display:flex; align-items:baseline; gap:7px; flex-wrap:wrap}
  .lcard .lby{font-size:.63rem; font-family:var(--mono); color:var(--faint); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .lcard .lbdg{flex:0 0 auto; font-size:.54rem; font-family:var(--mono);
    padding:2px 6px; border-radius:999px; letter-spacing:.02em; font-weight:400}
  .lcard.hero-card{background:linear-gradient(120deg,#fff,#fdecea); border:2px solid var(--hue); padding:14px 18px}
  .lcard.hero-card .lname{font-size:1.06rem}
  .lcard.hero-card .lby{white-space:normal}
  .lgrp{font-family:var(--mono); font-size:.66rem; letter-spacing:.08em; color:var(--muted);
    margin:16px 2px 8px; display:flex; align-items:center; gap:8px}
  .lgrp::after{content:""; flex:1 1 auto; height:1px; background:var(--card-bd)}
  .lgrp:first-child{margin-top:0}
  .lgrp .ic{font-size:.95rem}
  .lcard.hero-card .glyph,.tools-hero .lg svg{width:48px; height:48px}
  .lcard.hero-card .glyph svg{width:48px; height:48px}
  .lname .who{font-family:var(--mono); font-size:.6em; font-weight:600; color:var(--muted); letter-spacing:0}
  @media (max-width:900px){.logo-grid{grid-template-columns:repeat(2,1fr)} .lcard.hero-card{grid-column:span 2}}
  /* Markdown slaytları (.md dosyaları → build.py → .viz-html içinde) */
  .md{max-width:62ch; margin:0 auto; text-align:left}
  .md-h1{font-family:var(--disp); font-weight:800; letter-spacing:-.02em; line-height:1.05;
    font-size:clamp(1.4rem,3vw,2rem); color:var(--ink); margin:0 0 .5em}
  .md-h2{font-family:var(--disp); font-weight:700; font-size:clamp(1.1rem,2.2vw,1.45rem);
    color:var(--hue); margin:1.1em 0 .4em}
  .md-h3{font-family:var(--mono); font-weight:700; font-size:.82rem; letter-spacing:.04em;
    text-transform:uppercase; color:var(--muted); margin:1em 0 .3em}
  .md-p{font-size:clamp(1rem,1.7vw,1.14rem); line-height:1.6; color:var(--ink); margin:.5em 0}
  .md-list{margin:.5em 0 .5em 1.2em; display:flex; flex-direction:column; gap:.4em}
  .md-list li{font-size:clamp(1rem,1.7vw,1.12rem); line-height:1.5; color:var(--ink); padding-left:.2em}
  .md-list li::marker{color:var(--hue); font-weight:700}
  .md-quote{margin:.8em 0; padding:.6em 1em; border-left:3px solid var(--hue);
    background:color-mix(in srgb,var(--hue) 6%,#fff); border-radius:0 10px 10px 0;
    font-size:clamp(1rem,1.7vw,1.14rem); color:var(--muted); font-style:italic}
  .md-hr{border:none; height:1px; background:var(--card-bd); margin:1.2em 0}
  .md strong{color:var(--ink); font-weight:700}
  .md code{font-family:var(--mono); font-size:.86em; background:#f1f4fa; color:var(--hue);
    padding:.1em .4em; border-radius:5px}
  .md a{color:var(--hue); text-decoration:none; border-bottom:1px dotted var(--hue)}
  .intro-viz{background:transparent; border:none; box-shadow:none; padding:0}
  .intro-viz svg{max-height:min(62vh,440px)}
  .viz text{font-family:var(--body)} .viz .m{font-family:var(--mono)}
  .cap{font-family:var(--mono); font-size:.78rem; letter-spacing:.05em; color:var(--muted)}
  .src{font-family:var(--mono); font-size:.68rem; letter-spacing:.02em; color:var(--faint); display:flex; gap:6px; flex-wrap:wrap; align-items:baseline}
  .src::before{content:"▸ kaynak"; color:color-mix(in srgb,var(--hue) 60%,var(--faint)); font-weight:700; margin-right:2px}
  .src span,.src .src-link{white-space:nowrap}
  .src>*:not(:last-child)::after{content:"·"; color:var(--card-bd); margin-left:6px}
  .src-link{color:var(--faint); text-decoration:none; border-bottom:1px dotted color-mix(in srgb,var(--hue) 45%,var(--card-bd)); cursor:pointer; transition:color .15s}
  .src-link:hover{color:var(--hue); border-bottom-color:var(--hue)}
  .src-link:focus-visible{outline:2px solid var(--hue); outline-offset:2px; border-radius:3px}

  /* intro */
  .intro-grid{display:grid; grid-template-columns:1.05fr .95fr; gap:clamp(20px,4vw,48px); align-items:center; width:100%}
  .intro-text{display:flex; flex-direction:column; gap:clamp(12px,2vh,20px)}
  .eyebrow{font-family:var(--mono); font-size:.8rem; letter-spacing:.26em; color:var(--faint)}
  .title-big{font-family:var(--disp); font-weight:800; letter-spacing:-.03em; line-height:.98; font-size:clamp(2.5rem,7vw,4.8rem);
             background:linear-gradient(120deg,#2b3566,#3b6fd4 55%,#12a594); -webkit-background-clip:text; background-clip:text; color:transparent}
  .lede{font-size:clamp(1.02rem,1.9vw,1.28rem); line-height:1.55; color:var(--muted); max-width:46ch}
  .lede b{color:var(--ink); font-weight:600}
  .hint{font-family:var(--mono); font-size:.78rem; letter-spacing:.08em; color:var(--faint)}
  .hint kbd{background:#fff; border:1px solid var(--card-bd); border-radius:6px; padding:2px 8px; color:var(--ink); box-shadow:0 1px 0 var(--card-bd)}

  /* nav */
  .nav{display:flex; align-items:center; justify-content:space-between; gap:16px}
  .btn{font-family:var(--body); font-weight:600; font-size:.95rem; color:var(--ink); background:#fff; border:1px solid var(--card-bd);
       padding:11px 20px; border-radius:11px; cursor:pointer; transition:all .18s; box-shadow:0 3px 10px rgba(40,60,120,.06)}
  .btn:hover:not(:disabled){border-color:#c9d1e6; transform:translateY(-1px)}
  .btn:active:not(:disabled){transform:translateY(0)}
  .btn:disabled{opacity:.32; cursor:default}
  .btn.primary{background:var(--hue); border-color:transparent; color:#fff; box-shadow:0 6px 18px color-mix(in srgb,var(--hue) 34%,transparent)}
  .btn.primary:hover{filter:brightness(1.06)}
  .btn:focus-visible{outline:2px solid var(--hue); outline-offset:2px}
  .dots{display:flex; gap:9px}
  .dots span{width:8px; height:8px; border-radius:50%; background:#d3dae9; transition:all .3s; cursor:pointer}
  .dots span.active{background:var(--hue); transform:scale(1.4)}

  @media (max-width:720px){
    .main{flex-direction:column; gap:12px}
    .rail{flex:0 0 auto; flex-direction:row; overflow:auto; align-self:stretch}
    .rung{flex:0 0 auto}.rung .rname{display:none}
    .intro-grid{grid-template-columns:1fr}
    .q{font-size:clamp(1.5rem,7vw,2.2rem)}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;animation:none!important}
    .content{opacity:1!important;transform:none!important}
  }
</style>
</head>
<body>
  <div class="deck" id="deck">
    <div class="top">
      <div class="brand">Bir LLM Nasıl İnşa Edilir? <b>· 5 basamak</b></div>
      <div class="counter"><em id="cur">1</em> / <span id="tot">7</span></div>
    </div>
    <div class="main">
      <div class="rail" id="rail"></div>
      <div class="content" id="content"></div>
    </div>
    <div class="nav">
      <button class="btn" id="prev">← Önceki</button>
      <div class="dots" id="dots"></div>
      <button class="btn primary" id="next">Sonraki →</button>
    </div>
  </div>
<script>
const HUES=["#3b6fd4","#12a594","#7c5cf0","#e0912b","#ec5f52"];
const RAIL=[["1","PRETRAINING"],["2","SFT"],["3","HİZALAMA"],["4","DÜŞÜNME"],["5","AGENT"]];
const TU="M1 21h4V9H1v12z M23 10c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-1z";

/* BUILD: ortak SVG'ler (intro vb.) */
/* --- robot.js --- */
/* ===== PAYLAŞILAN BİLEŞEN: kahraman-robot (ajan) =====
   Tek yerde tanımlı — tüm slaytlar buradan "kalıtım alır".
   Tutarlılık kuralı: ajan her yerde bu robotla temsil edilir.
   Kullanım:  ${agentRobot({x:500,y:120,s:1})}   → SVG <g> parçası döndürür
     x,y : robotun merkez konumu (gövde ortası civarı)
     s   : ölçek (1 = büyük/5a, ~0.75 = kompakt/5b-5c, ~0.62 = mini/5d)
     antenna : anten çizilsin mi (default true)
*/
function agentRobot(opts){
  opts = opts || {};
  const x = opts.x||0, y = opts.y||0, s = opts.s||1;
  const antenna = opts.antenna !== false;
  const ant = antenna
    ? `<line x1="0" y1="-44" x2="0" y2="-54" stroke="#ec5f52" stroke-width="3"/><circle cx="0" cy="-57" r="5" fill="#ec5f52"/>`
    : "";
  return `<g transform="translate(${x} ${y}) scale(${s})">
    <path d="M-46 50 Q-46 16 -27 11 L27 11 Q46 16 46 50 Z" fill="#fdecea" stroke="#ec5f52" stroke-width="2.5"/>
    <rect x="-16" y="19" width="32" height="24" rx="5" fill="#fff" stroke="#ec5f52" stroke-width="2"/>
    <path d="M-6 31 l5 6 l8 -11" fill="none" stroke="#26a06a" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="-64" y="14" width="14" height="34" rx="7" fill="#fdecea" stroke="#ec5f52" stroke-width="2.5"/>
    <rect x="50" y="14" width="14" height="34" rx="7" fill="#fdecea" stroke="#ec5f52" stroke-width="2.5"/>
    <path d="M-31 -37 Q-31 -50 -20 -52 L20 -52 Q31 -50 31 -37 L31 -14 Q31 -6 22 -4 L-22 -4 Q-31 -6 -31 -14 Z" fill="#ec5f52"/>
    <rect x="-23" y="-34" width="46" height="20" rx="6" fill="#2b2f4a"/>
    <circle cx="-11" cy="-24" r="4.5" fill="#8fd0ff"/><circle cx="11" cy="-24" r="4.5" fill="#8fd0ff"/>
    <path d="M-31 -30 l-8 -5 v12 l8 -2 z" fill="#c8463c"/><path d="M31 -30 l8 -5 v12 l-8 -2 z" fill="#c8463c"/>
    ${ant}
  </g>`;
}
/* --- svg-intro.js --- */
/* ===== PAYLAŞILAN: robot inşa merdiveni (intro + recap birlikte kullanır) =====
   LLM basamak basamak inşa edilirken robot da parça parça tamamlanır ve
   giderek yükselen bir sütunun üstünde durur (merdiven).
   1 tohum · 2 kafa · 3 gövde+kol · 4 gövde+kol + BÜYÜK KAFA (bacaksız) ·
   5 tam robot (bacaklar) + büyük + jetpack + parlama. Her adım basamak renginde.
   sub: her adımın altındaki üst-etiket dizisi. */
function buildLadder(sub,names){
  const C=["#3b6fd4","#12a594","#7c5cf0","#e0912b","#ec5f52"];
  const D=["#2a55b0","#0e8478","#5b3fd0","#c77d1e","#c8463c"];
  const cx=[95,232,378,524,672];            // yatay merkezler
  const colTop=[248,224,196,168,132];       // sütun tepe y'leri (yükselen merdiven)
  const baseY=292;                          // merdiven tabanı
  let s="";
  // sütunlar (podyum) — robot bunların üstünde durur
  for(let i=0;i<5;i++){
    const x=cx[i]-40, w=80, y=colTop[i], h=baseY-y;
    s+=`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="9" fill="${C[i]}" opacity=".12"/>`
      +`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="9" fill="none" stroke="${C[i]}" stroke-width="2"/>`;
  }
  // her adımın robotu, sütun tepesine oturur (y = colTop[i])
  s+=robotStage(0,cx[0],colTop[0],C[0],D[0],{seed:true});
  s+=robotStage(1,cx[1],colTop[1],C[1],D[1],{head:1});
  s+=robotStage(2,cx[2],colTop[2],C[2],D[2],{head:1,body:1,arms:1});
  s+=robotStage(3,cx[3],colTop[3],C[3],D[3],{head:1.4,body:1,arms:1,bolts:1});   // BÜYÜK kafa + kafa yıldırımları, bacak yok
  s+=robotStage(4,cx[4],colTop[4],C[4],D[4],{head:1.3,body:1,arms:1,legs:1,jet:1,big:1,glow:1,bolts:1});  // en büyük + ihtişamlı
  // etiketler (sütun altına) — names verilmezse basamak adları
  const nm=names||["PRETRAINING","SFT","HİZALAMA","DÜŞÜNME","AGENT"];

/* tek bir inşa aşaması robotu; (x,ty)=sütun tepe noktası, robot bunun üstünde durur */
function robotStage(i,x,ty,c,d,p){
  const g=(s)=>`<g transform="translate(${x} ${ty})">${s}</g>`;
  if(p.seed) return g(`<circle cx="0" cy="-16" r="15" fill="${c}" opacity=".22"/><circle cx="0" cy="-16" r="7" fill="${c}"/><circle cx="0" cy="-16" r="2.5" fill="#fff"/>`);
  const hs=p.head||1;                        // kafa ölçeği
  let s="";
  // robotun tabanı sütun üstünde (y=0). Bacak varsa ayaklar y=0'a oturur,
  // yoksa gövde alt kenarı y=-2'ye (hafif üstte) oturur.
  const bodyBottom=p.legs?-22:-4;            // gövde alt kenarı
  // glow (parlama) — gövde merkezine göre
  if(p.glow) s+=`<circle cx="0" cy="-58" r="70" fill="${c}" opacity=".08"/>`
    +`<g stroke="#ffd485" stroke-width="2.6" stroke-linecap="round"><line x1="-62" y1="-58" x2="-52" y2="-58"/><line x1="52" y1="-58" x2="62" y2="-58"/><line x1="-50" y1="-100" x2="-42" y2="-92"/><line x1="50" y1="-100" x2="42" y2="-92"/></g>`;
  // jetpack (omuzların DIŞINDA iki roket, tepesi + altta belirgin alev) — kolların dışına taşar
  if(p.jet){const jy=bodyBottom-52, jx=52;   // roket üst hizası omuz üstü, kolların dışında
    s+=`<rect x="${-jx-6}" y="${jy}" width="14" height="40" rx="7" fill="${d}"/>`
      +`<rect x="${jx-8}" y="${jy}" width="14" height="40" rx="7" fill="${d}"/>`
      +`<ellipse cx="${-jx+1}" cy="${jy+2}" rx="7" ry="4" fill="#ffd485"/><ellipse cx="${jx-1}" cy="${jy+2}" rx="7" ry="4" fill="#ffd485"/>`
      +`<path d="M${-jx-6} ${jy+40} q7 20 14 0 z" fill="#ffb347"/><path d="M${-jx-2} ${jy+40} q3 11 6 0 z" fill="#ffe08a"/>`
      +`<path d="M${jx-8} ${jy+40} q7 20 14 0 z" fill="#ffb347"/><path d="M${jx-4} ${jy+40} q3 11 6 0 z" fill="#ffe08a"/>`;
  }
  // bacaklar (ayaklar y=0 = sütun üstü)
  if(p.legs) s+=`<rect x="-16" y="-22" width="12" height="18" rx="4" fill="${c}"/><rect x="4" y="-22" width="12" height="18" rx="4" fill="${c}"/>`
    +`<rect x="-19" y="-6" width="17" height="7" rx="3.5" fill="${d}"/><rect x="2" y="-6" width="17" height="7" rx="3.5" fill="${d}"/>`;
  if(p.body){const bw=p.big?48:44,bh=p.big?46:42;
    s+=`<rect x="${-bw/2}" y="${bodyBottom-bh}" width="${bw}" height="${bh}" rx="10" fill="${c}"/>`;
    if(p.big) s+=`<rect x="-12" y="${bodyBottom-bh+8}" width="24" height="20" rx="5" fill="#fff"/><path d="M-5 ${bodyBottom-bh+18} l4 5 l7 -9" fill="none" stroke="#26a06a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>`;
    else s+=`<rect x="-11" y="${bodyBottom-bh+8}" width="22" height="18" rx="4" fill="#fff" opacity=".85"/>`;
  }
  // kollar
  if(p.arms){const ax=p.big?37:34, aw=p.big?11:10, ah=p.big?38:34, ay=bodyBottom-ah-4;
    s+=`<rect x="${-ax}" y="${ay}" width="${aw}" height="${ah}" rx="${aw/2}" fill="${c}"/>`
      +`<rect x="${ax-aw}" y="${ay}" width="${aw}" height="${ah}" rx="${aw/2}" fill="${c}"/>`;
  }
  // kafa (ölçeklenebilir) — gövdenin üstüne
  const headBottom=p.body?bodyBottom-(p.big?46:42):-8;
  const hw=19*hs, hh=(hs>1?15:14)*1, ex=6*hs, er=(p.big?3.4:3.2)*hs;
  s+=`<g transform="translate(0 ${headBottom-16*hs})">`
    +`<path d="M${-hw} ${-14*hs} Q${-hw} ${-26*hs} ${-8*hs} ${-28*hs} L${8*hs} ${-28*hs} Q${hw} ${-26*hs} ${hw} ${-14*hs} L${hw} ${4*hs} Q${hw} ${11*hs} ${11*hs} ${12*hs} L${-11*hs} ${12*hs} Q${-hw} ${11*hs} ${-hw} ${4*hs} Z" fill="${c}"/>`
    +`<rect x="${-14*hs}" y="${-11*hs}" width="${28*hs}" height="${13*hs}" rx="${4*hs}" fill="#2b2f4a"/>`
    +`<circle cx="${-ex}" cy="${-4.5*hs}" r="${er}" fill="#8fd0ff"/><circle cx="${ex}" cy="${-4.5*hs}" r="${er}" fill="#8fd0ff"/>`
    +`<path d="M${-hw} ${-9*hs} l${-6*hs} ${-4*hs} v${10*hs} l${6*hs} ${-2*hs} z" fill="${d}"/><path d="M${hw} ${-9*hs} l${6*hs} ${-4*hs} v${10*hs} l${-6*hs} ${-2*hs} z" fill="${d}"/>`
    +`<line x1="0" y1="${-28*hs}" x2="0" y2="${-37*hs}" stroke="${c}" stroke-width="${2.5*hs}"/><circle cx="0" cy="${-40*hs}" r="${3.6*hs}" fill="${c}"/>`;
  // kafa etrafında sarı yıldırımlar (düşünme / ihtişam) — kafa merkezine göre
  if(p.bolts){const R=hw+7;
    const bolt=(bx,by,sc,rot)=>`<path d="M0 -7 L-3 0 L1 0 L-2 7 L4 -1 L0 -1 Z" fill="#ffd34d" stroke="#f5b800" stroke-width=".6" transform="translate(${bx} ${by}) scale(${sc}) rotate(${rot})"/>`;
    s+=bolt(-R, -6*hs, 1.15*hs, -18)+bolt(R, -6*hs, 1.15*hs, 18)
      +bolt(-R+6, -20*hs, 1*hs, -34)+bolt(R-6, -20*hs, 1*hs, 34)
      +bolt(0, -30*hs, 1.1*hs, 0);
  }
  s+=`</g>`;
  return g(s);
}

/* ===== Slayt 19: 5h · GERÇEK DÜNYA — AI kodlama ajanları (logo ızgarası) ===== */

/* Ürün logoları — RESMİ marka işaretleri (inline SVG, path'ler her markanın
   kendi vektör logosundan: Simple Icons / Lobe Icons açık koleksiyonları).
   Tek dosya kısıtı: dış kaynak yok, hepsi gömülü.
   brandMark(bg, mark, d, opt): 40×40 kart · bg zemin · d = 0..24 viewBox path · mark rengi.
   İşaret 24×24 viewBox'tan 8px kenar boşluğuyla 40×40'a ortalanır (scale 24→24, translate 8). */
function brandMark(bg, mark, d, opt){
  opt = opt || {};
  const border = opt.border ? ` stroke="#e6eaf4" stroke-width="1.5"` : "";
  const inset = opt.inset || 8;            // kenar boşluğu (px)
  const size = 40 - inset*2;               // işaretin gerçek boyutu
  const sc = size/24;
  return `<svg viewBox="0 0 40 40"><rect width="40" height="40" rx="9" fill="${bg}"${border}/>`
    + `<g transform="translate(${inset} ${inset}) scale(${sc})" fill="${mark}"><path fill-rule="evenodd" d="${d}"/></g></svg>`;
}

/* tek ürün kartı — reuse (DRY). p:{key,name,by,state} · state: "open" | "closed" */
function lcard(p){
  const cls = p.state==="open"?"bdg open":"bdg closed";
  const txt = p.state==="open"?"açık":"kapalı";
  return `<div class="lcard">
    <span class="glyph">${LOGO[p.key]}</span>
    <span class="meta">
      <span class="lname">${p.name}<span class="lbdg ${cls}">${txt}</span></span>
      <span class="lby">${p.by}</span>
    </span>
  </div>`;
}

SLIDE({type:"step",n:5,hue:HUES[4],label:"05 · AGENT · gerçek dünya",start:"peki tüm bunlar gerçek hayatta ne?",
  q:"AI KODLAMA AJANLARI",html:HTML_TOOLS,cap:"Claude Code ve ekosistemi — ajan kavramının yaşayan ürünleri"});

const deck=document.getElementById("deck"),content=document.getElementById("content"),rail=document.getElementById("rail");
const curEl=document.getElementById("cur"),dotsEl=document.getElementById("dots"),prevBtn=document.getElementById("prev"),nextBtn=document.getElementById("next");
document.getElementById("tot").textContent=SLIDES.length;

/* basamak n'in ilk slaytının index'i (type "step" & aynı n); yoksa -1 */
function firstSlideOfStep(n){return SLIDES.findIndex(s=>s.type==="step"&&s.n===n);}
const rungEls=RAIL.map((r,i)=>{const el=document.createElement("div");el.className="rung";el.style.setProperty("--c",HUES[i]);
  el.style.marginLeft=(i*14)+"px";el.style.cursor="pointer";el.innerHTML=`<span class="rnum">${r[0]}</span><span class="rname">${r[1]}</span>`;
  el.addEventListener("click",()=>{const t=firstSlideOfStep(i+1);if(t>=0)go(t);});rail.appendChild(el);return el;});
const dotEls=SLIDES.map((_,i)=>{const s=document.createElement("span");s.addEventListener("click",()=>go(i));dotsEl.appendChild(s);return s;});

let idx=0;
function states(i){const s=SLIDES[i];if(s.type==="intro")return{rev:0,cur:0};if(s.type==="recap")return{rev:5,cur:0};return{rev:s.n,cur:s.n};}

function render(){
  const s=SLIDES[idx],{rev,cur}=states(idx),hue=s.hue||HUES[0];
  deck.classList.toggle("intro",s.type==="intro");
  deck.style.setProperty("--hue",hue);
  curEl.textContent=idx+1;
  prevBtn.disabled=idx===0; nextBtn.disabled=idx===SLIDES.length-1;
  nextBtn.textContent=idx===SLIDES.length-1?"Bitti":"Sonraki →";
  dotEls.forEach((d,i)=>{d.classList.toggle("active",i===idx);d.style.setProperty("--hue",hue);});
  rungEls.forEach((el,i)=>{const n=i+1;el.classList.toggle("done",n<=rev&&n!==cur);el.classList.toggle("cur",n===cur);});
  content.innerHTML=build(s);
  animateEnter();
}
function animateEnter(){
  content.classList.remove("enter-next","enter-prev");
  void content.offsetWidth;                 /* reflow: transition'ı yeniden tetikler */
  content.classList.add(lastDir>0?"enter-next":"enter-prev");
}
function build(s){
  if(s.type==="intro")return `<div class="intro-grid"><div class="intro-text">
     <div class="eyebrow">YAPAY ZEKA · BİR GİRİŞ</div>
     <h1 class="title-big">Bir LLM Nasıl İnşa Edilir?</h1>
     <p class="lede"><b>“Yapay zeka” = büyük dil modeli.</b><br>Sıfırdan nasıl bu hâle gelir?</p>
     <div class="hint">İlerlemek için <kbd>→</kbd> ya da “Sonraki”</div></div>
     <div class="viz intro-viz">${SVG_INTRO}</div></div>`;
  if(s.type==="recap")return `<div class="cap" style="color:var(--hue)">ÖZET</div><h2 class="q">${s.q}</h2>
     <div class="viz">${s.svg}</div><div class="cap">${s.cap}</div>${srcLine(s)}`;
  const chip=s.gap?`<div class="eksik">önceki eksik: ${s.gap}</div>`:`<div class="eksik" style="color:var(--muted);background:rgba(0,0,0,.03);border-color:var(--card-bd)">${s.start}</div>`;
  const viz=s.html?`<div class="viz viz-html">${s.html}</div>`:`<div class="viz">${s.svg}</div>`;
  return `${chip}<div class="qrow"><h2 class="q">${s.q}</h2>${substepDots()}</div>${viz}<div class="cap">${s.cap}</div>${srcLine(s)}`;
}
function srcUrl(cite){
  const arxiv=cite.match(/arXiv:(\d{4}\.\d{4,5})/i);
  if(arxiv)return "https://arxiv.org/abs/"+arxiv[1];
  const url=cite.match(/https?:\/\/\S+|[\w.-]+\.[a-z]{2,}\/\S+/i);
  if(url)return url[0].startsWith("http")?url[0]:"https://"+url[0];
  return null;
}
function srcLine(s){
  if(!s.src||!s.src.length)return "";
  const items=s.src.map(c=>{
    const url=srcUrl(c);
    return url
      ? `<a class="src-link" href="${url}" target="_blank" rel="noopener">${c}</a>`
      : `<span>${c}</span>`;
  }).join("");
  return `<div class="src">${items}</div>`;
}
function substep(){
  const s=SLIDES[idx];if(s.type!=="step")return null;
  let first=idx;while(first>0&&SLIDES[first-1].type==="step"&&SLIDES[first-1].n===s.n)first--;
  let count=0;while(first+count<SLIDES.length&&SLIDES[first+count].type==="step"&&SLIDES[first+count].n===s.n)count++;
  if(count<2)return null;
  return{pos:idx-first,count};
}
function substepDots(){
  const info=substep();if(!info)return "";
  const dots=Array.from({length:info.count},(_,i)=>`<span class="${i===info.pos?"on":""}"></span>`).join("");
  return `<div class="substep" title="bu basamağın ${info.count} adımından ${info.pos+1}.">${dots}</div>`;
}
let lastDir=1;
function go(i){
  const next=Math.max(0,Math.min(SLIDES.length-1,i));
  if(next===idx)return;
  lastDir=next>idx?1:-1;
  idx=next;
  if(location.hash!=="#"+(idx+1))location.hash=idx+1;
  render();
}
function slideFromHash(){
  const n=parseInt(location.hash.slice(1),10);
  return Number.isFinite(n)?Math.max(0,Math.min(SLIDES.length-1,n-1)):0;
}
prevBtn.onclick=()=>go(idx-1); nextBtn.onclick=()=>go(idx+1);
window.addEventListener("keydown",e=>{
  if(["ArrowRight"," ","PageDown"].includes(e.key)){e.preventDefault();go(idx+1);}
  else if(["ArrowLeft","PageUp"].includes(e.key)){e.preventDefault();go(idx-1);}
  else if(e.key==="Home")go(0); else if(e.key==="End")go(SLIDES.length-1);
});
window.addEventListener("hashchange",()=>{const i=slideFromHash();if(i!==idx)go(i);});
idx=slideFromHash();
render();
</script>
</body>
</html>
